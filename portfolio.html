<script>
  (function () {
    var host = location.hostname;
    var allow = host && host !== 'localhost' && !host.endsWith('.local') && !/^\d/.test(host);
    if (allow) {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://use.typekit.net/yec0vnt.css';
      document.head.appendChild(l);

<link rel="stylesheet" href="styles.css">

<style>
  :root {
    --cream:   #FCF1E2;
    --tan:     #E9D9BF;
    --tumeric: #CEA32B;
    --sage:    #6B6B44;
    --pepper:  #231C14;
    --poppy:   #BC372E;
    --maroon:  #521B17;
    --font-display: 'aktiv-grotesk-extended', 'Archivo', sans-serif;
    --font-body:    'aktiv-grotesk', 'Archivo', sans-serif;
    --grid-gap: 6px;
    --col-count: 4;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--pepper); color: var(--cream); font-family: var(--font-body); }

  .filter-bar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--pepper);
    border-bottom: 1px solid rgba(252,241,226,.10);
  }
  .filter-bar__btn {
    font-family: var(--font-display);
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: rgba(252,241,226,.55);
    background: transparent;
    border: 1px solid rgba(252,241,226,.18);
    border-radius: 2px;
    padding: 7px 18px;
    cursor: pointer;
    transition: color .2s, border-color .2s, background .2s;
    white-space: nowrap;
  }
  .filter-bar__btn:hover,
  .filter-bar__btn.is-active {
    color: var(--pepper);
    background: var(--tumeric);
    border-color: var(--tumeric);
  }

  /* JS-driven masonry: items absolutely positioned by JS for true row-first ordering */
  .portfolio-grid { padding: var(--grid-gap); }
  .masonry {
    position: relative;
    width: 100%;
  }

  .pf-item {
    display: block;
    position: absolute;
    overflow: hidden;
    cursor: zoom-in;
    background: rgba(255,255,255,.04);
    transition: opacity .25s ease;
  }
  .pf-item img {
    display: block; width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .45s cubic-bezier(.25,.46,.45,.94), filter .35s ease;
    filter: brightness(.95);
  }
  .pf-item:hover img { transform: scale(1.04); filter: brightness(1); }

  .pf-item__label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 22px 12px 10px;
    background: linear-gradient(transparent, rgba(35,28,20,.82));
    font-family: var(--font-display);
    font-size: 9px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--cream);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .3s ease, transform .3s ease;
    pointer-events: none;
  }
  .pf-item:hover .pf-item__label { opacity: 1; transform: translateY(0); }
  .pf-item.is-hidden { display: none; }

  /* Responsive column counts */
  @media (max-width: 1100px) { :root { --col-count: 3; } }
  @media (max-width: 700px)  { :root { --col-count: 2; } }
  @media (max-width: 420px)  { :root { --col-count: 1; } }

  /* Lightbox */
  .lb-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(35,28,20,.96);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .lb-overlay.is-open { display: flex; }
  .lb-inner {
    position: relative;
    max-width: min(1100px, 94vw);
    max-height: 90vh;
    display: flex; align-items: center; justify-content: center;
  }
  .lb-img {
    max-width: 100%; max-height: 88vh;
    object-fit: contain; display: block;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    border: 1px solid rgba(252,241,226,.08);
    opacity: 0; transform: scale(.97);
    transition: opacity .3s ease, transform .3s ease;
  }
  .lb-overlay.is-open .lb-img { opacity: 1; transform: scale(1); }
  .lb-caption {
    position: absolute; bottom: -32px; left: 0; right: 0;
    text-align: center;
    font-family: var(--font-body);
    font-size: 12px; letter-spacing: .06em;
    color: rgba(252,241,226,.45);
  }
  .lb-btn {
    position: fixed;
    background: rgba(252,241,226,.08);
    border: 1px solid rgba(252,241,226,.14);
    color: var(--cream);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s ease, border-color .2s ease;
  }
  .lb-btn:hover { background: var(--tumeric); border-color: var(--tumeric); color: var(--pepper); }
  .lb-close {
    top: 18px; right: 18px;
    width: 42px; height: 42px;
    border-radius: 50%;
    font-size: 20px; line-height: 1;
  }
  .lb-prev, .lb-next {
    top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px;
    border-radius: 50%;
    font-size: 22px;
  }
  .lb-prev { left: 14px; }
  .lb-next { right: 14px; }
  @media (max-width: 600px) {
    .lb-prev { left: 6px; }
    .lb-next { right: 6px; }
    .lb-close { top: 10px; right: 10px; width: 36px; height: 36px; font-size: 16px; }
  }

  .mini-hero {
    background: var(--pepper);
    padding: 80px 24px 48px;
    text-align: center;
    border-bottom: 1px solid rgba(252,241,226,.08);
  }
  .mini-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--cream);
    margin-top: 20px;
  }
  .mini-hero__cats {
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: .14em;
    color: rgba(252,241,226,.45);
    text-transform: uppercase;
  }
</style>
</head>

<script src="scripts.js"></script>
<script>
/* ══════════════════════════════════════════════════════════
   PHOTO GRID — driven by photos.json
   To add/remove/recategorize images, edit photos.json only.
   ════════════════════════════════════════════════════════ */
(function () {
  'use strict';
  var pfGrid   = document.getElementById('masonryGrid');
  var pfBtns   = document.querySelectorAll('.filter-bar__btn');
  var PF_GAP   = 6;
  var allItems = [];

  /* ── Build grid from photos.json ─────────────────────── */
  function loadPortfolio() {
    fetch('photos.json')
      .then(function(res) {
        if (!res.ok) throw new Error(res.status + ' — photos.json not found');
        return res.json();
      })
      .then(buildGrid)
      .catch(function(err) {
        pfGrid.innerHTML = '<p style="color:var(--cream);padding:40px;font-family:var(--font-body)">Could not load photos.json: ' + err + '</p>';
        console.error(err);
      });
  }

  function buildGrid(photos) {
    pfGrid.innerHTML = '';
    photos.forEach(function(photo) {
      var a               = document.createElement('a');
      a.href              = '#';
      a.className         = 'pf-item';
      a.dataset.category  = photo.cat;
      a.dataset.src       = photo.src;
      a.dataset.alt       = photo.brand;

      var img             = document.createElement('img');
      img.src             = photo.src;
      img.alt             = photo.brand;
      img.loading         = 'lazy';
      img.style.aspectRatio = photo.ratio;

      var label           = document.createElement('div');
      label.className     = 'pf-item__label';
      label.textContent   = photo.brand;

      a.appendChild(img);
      a.appendChild(label);
      pfGrid.appendChild(a);
    });

    allItems = Array.from(pfGrid.querySelectorAll('.pf-item'));
    bindFilters();
    bindLightbox();
    layoutMasonry();
  }
  /* ── Masonry ─────────────────────────────────────────── */
  function getColCount() {
    var cs = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--col-count'));
    return Math.max(1, cs || 4);
  }

  function layoutMasonry() {
    var cols       = getColCount();
    var gridWidth  = pfGrid.clientWidth;
    if (gridWidth <= 0) return;
    var colWidth   = (gridWidth - PF_GAP * (cols - 1)) / cols;
    var colHeights = new Array(cols).fill(0);

    allItems.forEach(function(item) {
      if (item.classList.contains('is-hidden')) {
        item.style.visibility = 'hidden';
        return;
      }
      item.style.visibility = 'visible';

      var minIdx = 0;
      for (var i = 1; i < cols; i++) {
        if (colHeights[i] < colHeights[minIdx]) minIdx = i;
      }

      var img        = item.querySelector('img');
      var arStr      = img.style.aspectRatio || '1/1';
      var parts      = arStr.split('/').map(Number);
      var itemHeight = colWidth * (parts[1] / parts[0]);

      item.style.width  = colWidth + 'px';
      item.style.height = itemHeight + 'px';
      item.style.left   = (minIdx * (colWidth + PF_GAP)) + 'px';
      item.style.top    = colHeights[minIdx] + 'px';

      colHeights[minIdx] += itemHeight + PF_GAP;
    });

    pfGrid.style.height = Math.max.apply(null, colHeights) + 'px';
  }

  /* ── Filter ──────────────────────────────────────────── */
  function bindFilters() {
    pfBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        pfBtns.forEach(function(b) { b.classList.remove('is-active'); });
        btn.classList.add('is-active');
        var f = btn.dataset.filter;
        allItems.forEach(function(item) {
          item.classList.toggle('is-hidden', f !== 'all' && item.dataset.category !== f);
        });
        layoutMasonry();
      });
    });
  }

  /* ── Lightbox ────────────────────────────────────────── */
  var lb        = document.getElementById('lightbox');
  var lbImg     = document.getElementById('lbImg');
  var lbCaption = document.getElementById('lbCaption');
  var lbClose   = document.getElementById('lbClose');
  var lbPrev    = document.getElementById('lbPrev');
  var lbNext    = document.getElementById('lbNext');
  var visItems  = [];
  var curIdx    = 0;

  function getVisible() {
    return allItems.filter(function(el) { return !el.classList.contains('is-hidden'); });
  }

  function showImage(idx) {
    var item = visItems[idx];
    if (!item) return;
    var src = item.dataset.src || item.querySelector('img').src;
    var alt = item.dataset.alt || item.querySelector('img').alt;
    lbImg.style.opacity   = '0';
    lbImg.style.transform = 'scale(.97)';
    setTimeout(function() {
      lbImg.src             = src;
      lbImg.alt             = alt;
      lbCaption.textContent = alt;
      lbImg.style.opacity   = '1';
      lbImg.style.transform = 'scale(1)';
    }, 120);
    lbPrev.style.display = visItems.length <= 1 ? 'none' : 'flex';
    lbNext.style.display = visItems.length <= 1 ? 'none' : 'flex';
  }

  function openLightbox(idx) {
    visItems = getVisible();
    curIdx   = idx;
    showImage(curIdx);
    lb.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(function() { lbImg.src = ''; }, 300);
  }

  function bindLightbox() {
    allItems.forEach(function(item) {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        var vis    = getVisible();
        var visIdx = vis.indexOf(item);
        if (visIdx > -1) openLightbox(visIdx);
      });
    });
    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', function() {
      curIdx = (curIdx - 1 + visItems.length) % visItems.length;
      showImage(curIdx);
    });
    lbNext.addEventListener('click', function() {
      curIdx = (curIdx + 1) % visItems.length;
      showImage(curIdx);
    });
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('is-open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  { curIdx = (curIdx - 1 + visItems.length) % visItems.length; showImage(curIdx); }
      if (e.key === 'ArrowRight') { curIdx = (curIdx + 1) % visItems.length; showImage(curIdx); }
    });
  }

  /* ── Resize ──────────────────────────────────────────── */
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(layoutMasonry, 100);
  });

  /* ── Boot ────────────────────────────────────────────── */
  loadPortfolio();

})();
</script>
</body>
